name: Deploy Backend to AWS EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies & Build
        working-directory: ./backend
        run: |
          npm ci
          npm run build

      - name: Package Backend Code
        run: |
          tar --exclude="node_modules" -czvf backend-deploy.tar.gz -C backend .

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/microps-backend

      - name: Copy Package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend-deploy.tar.gz"
          target: "/home/ubuntu/microps-backend"

      - name: Restart Production PM2 Process on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/microps-backend
            tar -xvf backend-deploy.tar.gz
            rm backend-deploy.tar.gz
            npm ci --production
            pm2 restart microps-backend || pm2 start dist/server.js --name microps-backend
            pm2 save
