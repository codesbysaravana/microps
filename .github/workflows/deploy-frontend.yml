name: Deploy Frontend SPA to AWS S3 & CloudFront

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies & Build SPA
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://microps.in/api/v1' }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Deploy to S3 Static Website Bucket
        run: |
          aws s3 sync frontend/dist s3://microps-client --delete

      - name: Package Frontend Build
        run: |
          tar -czvf frontend-deploy.tar.gz -C frontend/dist .

      - name: Copy Frontend Package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend-deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Update EC2 Nginx Web Root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/microps-frontend
            sudo rm -rf /var/www/microps-frontend/*
            sudo tar -xvf /home/ubuntu/frontend-deploy.tar.gz -C /var/www/microps-frontend
            rm -f /home/ubuntu/frontend-deploy.tar.gz
            sudo systemctl reload nginx
