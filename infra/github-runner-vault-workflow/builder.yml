name: MicrOps Tenant Builder

on:
  workflow_dispatch:
    inputs:
      tenantScript:
        description: 'Generated Bash Script from MicrOps'
        required: true
      correlationId:
        description: 'Unique correlation ID for matching runs'
        required: true

jobs:
  execute-build:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Execute Tenant Build Script
        env:
          TENANT_SCRIPT: ${{ github.event.inputs.tenantScript }}
          CORRELATION_ID: ${{ github.event.inputs.correlationId }}
        run: |
          echo "=== MicrOps Build Starting ==="
          echo "Correlation ID: $CORRELATION_ID"
          echo "$TENANT_SCRIPT" > run_build.sh
          chmod +x run_build.sh
          ./run_build.sh
